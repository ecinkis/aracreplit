<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Gorusme - Arac Takasi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #videos {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #1a1a2e;
    }
    #localVideo {
      position: absolute;
      top: 60px;
      right: 16px;
      width: 120px;
      height: 160px;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      z-index: 10;
      background: #16213e;
    }
    .controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 20;
    }
    .control-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
    }
    .control-btn:active { transform: scale(0.9); }
    .control-btn.end-call { background: #ef4444; width: 64px; height: 64px; }
    .control-btn.muted { background: rgba(239,68,68,0.6); }
    .control-btn svg { fill: #fff; }
    .status-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      z-index: 5;
      transition: opacity 0.5s;
    }
    .status-overlay.hidden { opacity: 0; pointer-events: none; }
    .status-text {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      margin-top: 24px;
      text-align: center;
    }
    .status-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }
    .pulse-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(59,130,246,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse-ring-inner {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(59,130,246,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pulse-ring-inner svg { fill: #fff; width: 32px; height: 32px; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }
    .timer {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.4);
      padding: 6px 16px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      z-index: 15;
      display: none;
    }
    .timer.visible { display: block; }
  </style>
</head>
<body>
  <div id="videos">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>

    <div class="status-overlay" id="statusOverlay">
      <div class="pulse-ring">
        <div class="pulse-ring-inner">
          <svg viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </div>
      </div>
      <div class="status-text" id="statusText">Baglantı kuruluyor...</div>
      <div class="status-subtitle" id="statusSubtitle">Karsi tarafin katilmasi bekleniyor</div>
    </div>

    <div class="timer" id="callTimer">00:00</div>

    <div class="controls">
      <button class="control-btn" id="toggleMic" title="Mikrofon">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="control-btn" id="toggleCamera" title="Kamera">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      </button>
      <button class="control-btn" id="switchCamera" title="Kamera Degistir">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5V13H9v2.5L5.5 12 9 8.5V11h6V8.5l3.5 3.5-3.5 3.5z"/></svg>
      </button>
      <button class="control-btn end-call" id="endCall" title="Gorusmeyi Bitir">
        <svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    const userId = params.get('userId');
    const userName = params.get('userName') || 'Kullanici';

    let localStream = null;
    let peerConnection = null;
    let ws = null;
    let isMicMuted = false;
    let isCameraMuted = false;
    let callStartTime = null;
    let timerInterval = null;
    let currentFacingMode = 'user';

    const config = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
      ]
    };

    async function init() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: true
        });
        document.getElementById('localVideo').srcObject = localStream;

        connectWebSocket();
      } catch (err) {
        console.error('Media error:', err);
        document.getElementById('statusText').textContent = 'Kamera veya mikrofon erisimi reddedildi';
        document.getElementById('statusSubtitle').textContent = 'Lutfen izinleri kontrol edin';
      }
    }

    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws/video-call`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'join', roomId, userId, userName }));
      };

      ws.onmessage = async (event) => {
        const data = JSON.parse(event.data);

        switch (data.type) {
          case 'user-joined':
            document.getElementById('statusText').textContent = `${data.userName || 'Karsi taraf'} baglandi`;
            document.getElementById('statusSubtitle').textContent = 'Video baglantisi kuruluyor...';
            await createOffer();
            break;

          case 'offer':
            await handleOffer(data);
            break;

          case 'answer':
            await handleAnswer(data);
            break;

          case 'ice-candidate':
            await handleIceCandidate(data);
            break;

          case 'user-left':
            handleUserLeft();
            break;

          case 'room-full':
            document.getElementById('statusText').textContent = 'Oda dolu';
            document.getElementById('statusSubtitle').textContent = 'Bu gorusmeye zaten 2 kisi katilmis';
            break;
        }
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected');
      };
    }

    function createPeerConnection() {
      peerConnection = new RTCPeerConnection(config);

      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      peerConnection.ontrack = (event) => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
        document.getElementById('statusOverlay').classList.add('hidden');
        startTimer();
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          ws.send(JSON.stringify({
            type: 'ice-candidate',
            roomId,
            candidate: event.candidate
          }));
        }
      };

      peerConnection.oniceconnectionstatechange = () => {
        if (peerConnection.iceConnectionState === 'disconnected' || 
            peerConnection.iceConnectionState === 'failed') {
          handleUserLeft();
        }
      };
    }

    async function createOffer() {
      createPeerConnection();
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      ws.send(JSON.stringify({ type: 'offer', roomId, sdp: offer }));
    }

    async function handleOffer(data) {
      createPeerConnection();
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: 'answer', roomId, sdp: answer }));
    }

    async function handleAnswer(data) {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
    }

    async function handleIceCandidate(data) {
      if (peerConnection) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    }

    function handleUserLeft() {
      document.getElementById('statusOverlay').classList.remove('hidden');
      document.getElementById('statusText').textContent = 'Gorusme sonlandirildi';
      document.getElementById('statusSubtitle').textContent = 'Karsi taraf ayrildi';
      stopTimer();
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
    }

    function startTimer() {
      callStartTime = Date.now();
      const timerEl = document.getElementById('callTimer');
      timerEl.classList.add('visible');
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
        const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const secs = (elapsed % 60).toString().padStart(2, '0');
        timerEl.textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    document.getElementById('toggleMic').addEventListener('click', () => {
      isMicMuted = !isMicMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
      document.getElementById('toggleMic').classList.toggle('muted', isMicMuted);
    });

    document.getElementById('toggleCamera').addEventListener('click', () => {
      isCameraMuted = !isCameraMuted;
      localStream.getVideoTracks().forEach(t => t.enabled = !isCameraMuted);
      document.getElementById('toggleCamera').classList.toggle('muted', isCameraMuted);
    });

    document.getElementById('switchCamera').addEventListener('click', async () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      const videoTrack = localStream.getVideoTracks()[0];
      if (videoTrack) {
        videoTrack.stop();
      }
      try {
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } }
        });
        const newVideoTrack = newStream.getVideoTracks()[0];
        localStream.removeTrack(videoTrack);
        localStream.addTrack(newVideoTrack);
        document.getElementById('localVideo').srcObject = localStream;
        if (peerConnection) {
          const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
          if (sender) {
            sender.replaceTrack(newVideoTrack);
          }
        }
      } catch (err) {
        console.error('Switch camera error:', err);
      }
    });

    document.getElementById('endCall').addEventListener('click', () => {
      stopTimer();
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
      if (peerConnection) {
        peerConnection.close();
      }
      if (ws) {
        ws.send(JSON.stringify({ type: 'leave', roomId }));
        ws.close();
      }
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'call-ended' }));
      } else {
        window.close();
      }
    });

    init();
  </script>
</body>
</html>
